# ohd.1learn.ai — OneHelpdesk (ticketprod) edge vhost.
# Injected into the RUNNING edge nginx (onemedehr-nginx-1) as
# /etc/nginx/conf.d/ohd.conf (see attach-ohd-vhost.sh). Intentionally NOT part
# of onemedehr's persistent config, so his.onemedai.org is never affected — not
# even if the onemedehr stack is fully recreated. Re-run the attach script after
# any recreate of the onemedehr (edge) OR ticketprod stack.
#
# HTTP→HTTPS redirect + ACME challenge are handled by the edge's existing
# default :80 server (it redirects/serves ACME for any $host), so only a :443
# block is needed here — same as the md.1learn.ai vhost.
#
# TLS is terminated here; ALL routing (api / admin / static / media / frontend)
# is done by the ticketprod stack's own internal nginx (ticketprod-nginx:80).
# The resolver + variable upstream means a temporarily-down ticketprod stack
# yields a 502 for ohd.1learn.ai ONLY and can never fail `nginx -t` or block an
# edge reload (his.onemedai.org stays up regardless).
server {
    listen 443 ssl;
    server_name ohd.1learn.ai;

    ssl_certificate     /etc/letsencrypt/live/ohd.1learn.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ohd.1learn.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 25M;

    # Docker embedded DNS — resolve the upstream at request time (deferred).
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $ohd_upstream ticketprod-nginx;

    location / {
        proxy_pass http://$ohd_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
