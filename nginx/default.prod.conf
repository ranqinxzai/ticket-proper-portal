# ─────────────────────────────────────────────────────────────────────
# INTERNAL nginx for the ticketprod stack (https://ohd.1learn.ai).
# HTTP-only on :80, no host port published. TLS is terminated at the EDGE
# router (onemedehr-nginx-1), which reverse-proxies the ohd.1learn.ai vhost
# here over the shared ticketprod_default network. This config just:
#   • serves Django collectstatic output + media from the shared volumes
#   • proxies /api + /admin to the Django backend
#   • proxies everything else to the Next.js frontend
# ─────────────────────────────────────────────────────────────────────

upstream prod_backend  { server ticketprod-backend:8000; }
upstream prod_frontend { server ticketprod-frontend:3000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # Django API
    location /api/ {
        proxy_pass http://prod_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Django admin + provisioning console backend
    location /admin/ {
        proxy_pass http://prod_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django collectstatic output (admin / DRF / Swagger assets)
    location /static/ {
        alias /var/www/ticket/static/;
        access_log off;
        expires 7d;
    }

    # Media uploads (ticket/comment attachments, screenshots)
    location /media/ {
        alias /var/www/ticket/media/;
        access_log off;
        expires 7d;
    }

    # Next.js frontend (catch-all)
    location / {
        proxy_pass http://prod_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
