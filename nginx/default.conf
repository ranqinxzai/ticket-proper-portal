upstream pilot_backend {
    server ticketpilot-backend:8000;
}

upstream pilot_frontend {
    server ticketpilot-frontend:3000;
}

# ── Port 80 (behind the edge router, Host-routed) ──────────────────────
# Serves the ACME HTTP-01 challenge and redirects everything else to HTTPS.
server {
    listen 80;
    server_name pilot-ticket.onemedai.org pilot-ticket.34.93.119.109.nip.io _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Port 443 (behind the edge router's SNI stream passthrough) ─────────
# Terminates TLS here with this stack's OWN Let's Encrypt certificate.
server {
    listen 443 ssl;
    server_name pilot-ticket.onemedai.org pilot-ticket.34.93.119.109.nip.io _;

    ssl_certificate     /etc/letsencrypt/live/pilot-ticket.onemedai.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pilot-ticket.onemedai.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # Django API
    location /api/ {
        proxy_pass http://pilot_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://pilot_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django collectstatic output
    location /static/ {
        alias /var/www/ticket/static/;
        access_log off;
        expires 7d;
    }

    # Media uploads
    location /media/ {
        alias /var/www/ticket/media/;
        access_log off;
        expires 7d;
    }

    # Next.js frontend (catch-all)
    location / {
        proxy_pass http://pilot_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
