name: ticketpilot

# Pilot instance of the ticketing system. Fully isolated from the live
# `ticketingsystem` stack: its own containers, volumes, network, database AND
# its own dedicated, pinned images (ticketpilot-*). These are decoupled from
# the live ticketingsystem-ticket-*:latest tags, so a live rebuild never
# changes the pilot. Serves on host :8090 (HTTP, direct IP) and via the edge
# router at https://pilot-ticket.onemedai.org (TLS terminated by this stack's nginx).

services:
  ticketpilot-db:
    image: postgres:16-alpine
    container_name: ticketpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketing_pilot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
    networks:
      - ticketpilot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ticketing_pilot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ticketpilot-backend:
    image: ticketpilot-backend:latest
    build:
      context: ./backend
    container_name: ticketpilot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    volumes:
      - ticket_static:/app/staticfiles
      - ticket_media:/app/media
    networks:
      - ticketpilot_net
    depends_on:
      ticketpilot-db:
        condition: service_healthy
    # gunicorn binds :8000 only after entrypoint.sh finishes migrations +
    # collectstatic, so a successful TCP connect == "schema is migrated, safe to
    # start the scheduler". The scheduler service waits on this.
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), 3).close()"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  # Dedicated, single-process scheduler. The web workers run with RUN_SCHEDULER
  # unset (3 gunicorn workers would mean 3 competing schedulers); exactly ONE of
  # these drives the SLA sweep, notification outbox flush, and email inbound
  # poll/retry. It bypasses entrypoint.sh (no migrations here — the backend is
  # the sole migrator) and starts only once the backend is healthy/migrated.
  ticketpilot-scheduler:
    image: ticketpilot-backend:latest
    build:
      context: ./backend
    container_name: ticketpilot-scheduler
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      RUN_SCHEDULER: "1"
    entrypoint: ["python", "manage.py", "run_scheduler"]
    volumes:
      - ticket_media:/app/media
    networks:
      - ticketpilot_net
    depends_on:
      ticketpilot-db:
        condition: service_healthy
      ticketpilot-backend:
        condition: service_healthy

  ticketpilot-frontend:
    image: ticketpilot-frontend:latest
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: /api/v1
    container_name: ticketpilot-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - ticketpilot_net
    depends_on:
      - ticketpilot-backend

  ticketpilot-nginx:
    image: ticketpilot-nginx:latest
    build:
      context: ./nginx
    container_name: ticketpilot-nginx
    restart: unless-stopped
    # HTTP on host :8090 for direct IP access; the edge router forwards the
    # pilot domain over edge_net (Host on :80, SNI passthrough on :443).
    # TLS is terminated here with this stack's own Let's Encrypt cert.
    ports:
      - "8090:80"
    expose:
      - "443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ticket_static:/var/www/ticket/static:ro
      - ticket_media:/var/www/ticket/media:ro
      - ticketpilot_certs:/etc/letsencrypt
      - ticketpilot_certbot_webroot:/var/www/certbot
    networks:
      - ticketpilot_net
      - edge_net
    depends_on:
      - ticketpilot-backend
      - ticketpilot-frontend

  ticketpilot-certbot:
    # On-demand TLS cert issuance/renewal (webroot served by ticketpilot-nginx :80).
    # Issue: docker compose run --rm ticketpilot-certbot certonly --webroot \
    #          -w /var/www/certbot -d pilot-ticket.onemedai.org \
    #          --email info@miaimmobilien.de --agree-tos --no-eff-email
    # Renew: docker compose run --rm ticketpilot-certbot renew  (then nginx -s reload)
    image: certbot/certbot:latest
    container_name: ticketpilot-certbot
    profiles: ["certbot"]
    volumes:
      - ticketpilot_certs:/etc/letsencrypt
      - ticketpilot_certbot_webroot:/var/www/certbot
    networks:
      - ticketpilot_net

networks:
  ticketpilot_net:
    name: ticketpilot_net
    driver: bridge
  edge_net:
    external: true

volumes:
  ticket_db_data:
  ticket_static:
  ticket_media:
  ticketpilot_certs:
  ticketpilot_certbot_webroot:
